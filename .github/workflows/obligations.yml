name: obligations

on:
  pull_request:
    paths:
      - "schemas/obligation.schema.json"
      - "examples/obligations/**"
      - "scripts/validate_obligations.py"
      - ".github/workflows/obligations.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/obligation.schema.json"
      - "examples/obligations/**"
      - "scripts/validate_obligations.py"
      - ".github/workflows/obligations.yml"

jobs:
  validate-obligations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependency
        run: python -m pip install jsonschema
      - name: Validate obligation examples
        run: python scripts/validate_obligations.py
